<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Кнопочка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #f64f59 50%, #f093fb 100%);
      background-size: 300% 300%;
      animation: gradientShift 6s ease infinite;
      font-family: 'Georgia', serif;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #btn {
      padding: 30px 60px;
      font-size: 2rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: white;
      color: #333;
      cursor: pointer;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 2px;
      user-select: none;
      min-width: 320px;
      text-align: center;
    }

    #btn:hover { transform: scale(1.05); box-shadow: 0 14px 50px rgba(0,0,0,0.4); }
    #btn:active { transform: scale(0.96); }

    #btn.pop {
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15) rotate(-2deg); }
      100% { transform: scale(1); }
    }

    #counter {
      margin-top: 28px;
      color: white;
      font-size: 1rem;
      opacity: 0.85;
      letter-spacing: 1px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    #reaction {
      position: fixed;
      font-size: 3.5rem;
      pointer-events: none;
      animation: flyUp 1.2s ease forwards;
      z-index: 99;
    }

    @keyframes flyUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-140px) scale(1.6); }
    }

    #tip {
      position: fixed;
      bottom: 24px;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .dog-img {
      position: fixed;
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 50;
      animation: dogPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes dogPop {
      0%   { opacity: 0; transform: scale(0.1) rotate(-20deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .dog-img.fade-out {
      animation: dogFade 0.8s ease forwards;
    }

    @keyframes dogFade {
      to { opacity: 0; transform: scale(0.8) rotate(5deg); }
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
        justify-content: center;
      }

      #btn {
        padding: 20px 40px;
        font-size: 1.4rem;
        min-width: 240px;
        max-width: 100%;
        letter-spacing: 1px;
      }

      #btn:hover {
        transform: scale(1.03);
      }

      #counter {
        margin-top: 20px;
        font-size: 0.9rem;
      }

      #reaction {
        font-size: 2.5rem;
      }

      #tip {
        bottom: 16px;
        font-size: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        padding: 0 16px;
        width: 100%;
      }

      .dog-img {
        width: 120px;
        height: 120px;
        border-radius: 8px;
        box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      #btn {
        padding: 16px 32px;
        font-size: 1.2rem;
        min-width: 220px;
        letter-spacing: 0px;
      }

      #counter {
        margin-top: 16px;
        font-size: 0.85rem;
      }

      #reaction {
        font-size: 2rem;
      }

      .dog-img {
        width: 100px;
        height: 100px;
        border-radius: 6px;
      }
    }
  </style>
</head>
<body>

  <button id="btn" onclick="nextWord()">Нажми меня</button>
  <div id="counter"></div>
  <div id="tip">нажимай и нажимай...</div>

  <script>
    const words = [
      "БЮРГЕР", "МЯМЛЯ", "ПУЗЫРЬ", "ХРЮКАЛО", "ШМЯКНУТЬ",
      "БУЛЬК", "ТЮТЕЛЬКА", "ПУЗАТИК", "ХИХИКАЛКА", "ШАРОМЫГА",
      "ФИТЮЛЬКА", "ЛЯПОТА", "БЯКА", "СОПЕЛКА", "ТЮЛЕНЬ",
      "КУДЫКИНА", "ХОХОТУШКА", "ПУПЫРЫШЕК", "МЯМЛИК", "КВАКША",
      "ЗЮЗЯ", "ТЮКНУТЬ", "БАЛБЕС", "ШАЛОПАЙ", "ПЫХТЕЛКА",
      "ПУЗОЖИТЕЛЬ", "ХРУМКАТЬ", "БУРКАЛЫ", "ШМЫГНУТЬ", "ТЮФЯК"
    ];

    const emojis = ["😂", "🤣", "💀", "😵", "🐸", "🥴", "😜", "🫠", "🤪", "😆"];

    const dogs = [
      "Dogs/dog_1.jpg", "Dogs/dog_2.jpg", "Dogs/dog_3.jpg", "Dogs/dog_4.jpg",
      "Dogs/dog_5.jpg", "Dogs/dog_6.jpg", "Dogs/dog_7.jpg", "Dogs/dog_8.jpg",
      "Dogs/dog_9.jpg", "Dogs/dog_10.jpg"
    ];

    let count = 0;
    let last = -1;

    function nextWord() {
      let idx;
      do { idx = Math.floor(Math.random() * words.length); } while (idx === last);
      last = idx;
      count++;

      const btn = document.getElementById('btn');
      btn.textContent = words[idx];

      btn.classList.remove('pop');
      void btn.offsetWidth;
      btn.classList.add('pop');

      const counter = document.getElementById('counter');
      counter.textContent = count === 1
        ? "первый раз нажал 🎉"
        : `нажато уже ${count} раз${ending(count)}`;

      spawnEmoji();
      spawnDog();
    }

    function ending(n) {
      const mod10 = n % 10, mod100 = n % 100;
      if (mod100 >= 11 && mod100 <= 19) return "!";
      if (mod10 === 1) return "!";
      if (mod10 >= 2 && mod10 <= 4) return "а!";
      return "!";
    }

    function spawnEmoji() {
      const el = document.createElement('div');
      el.id = 'reaction';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (20 + Math.random() * 60) + 'vw';
      el.style.top = (30 + Math.random() * 30) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function spawnDog() {
      const img = document.createElement('img');
      img.className = 'dog-img';
      img.src = dogs[Math.floor(Math.random() * dogs.length)];

      const btn = document.getElementById('btn');
      const btnRect = btn.getBoundingClientRect();
      const dogSize = window.innerWidth <= 480 ? 100 : window.innerWidth <= 768 ? 120 : 180;
      const padding = 40;

      let left, top, valid;
      do {
        valid = true;
        left = Math.random() * (window.innerWidth - dogSize);
        top = Math.random() * (window.innerHeight - dogSize);

        // Проверяем пересечение с кнопкой
        if (left < btnRect.right + padding &&
            left + dogSize > btnRect.left - padding &&
            top < btnRect.bottom + padding &&
            top + dogSize > btnRect.top - padding) {
          valid = false;
        }
      } while (!valid);

      img.style.left = left + 'px';
      img.style.top = top + 'px';
      document.body.appendChild(img);
      setTimeout(() => {
        img.classList.add('fade-out');
        setTimeout(() => img.remove(), 800);
      }, 3500);
    }
  </script>
</body>
</html>
